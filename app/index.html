<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가족 용돈/재테크 대시보드</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>가족 용돈/재테크 대시보드</h1>
      <p>나/첫째/둘째로 시작해서 자유롭게 멤버를 추가하세요.</p>
    </header>

    <main>
      <section class="card">
        <h2>멤버 관리</h2>
        <form id="member-form" class="inline-form">
          <input id="member-name" placeholder="예: 셋째" required />
          <button type="submit">멤버 추가</button>
        </form>
        <ul id="member-list"></ul>
      </section>

      <section class="card">
        <h2>거래 입력</h2>
        <form id="tx-form" class="grid-form">
          <label>일자<input id="tx-date" type="date" required /></label>
          <label>대상 멤버<select id="tx-member" required></select></label>
          <label>
            종류
            <select id="tx-type" required>
              <option value="allowance">용돈 수입</option>
              <option value="saving">저축</option>
              <option value="investment">투자</option>
            </select>
          </label>
          <label>금액(원)<input id="tx-amount" type="number" min="0" step="100" required /></label>
          <label>수익률(%, 투자일 때만)<input id="tx-return" type="number" step="0.01" placeholder="예: 5.2" /></label>
          <label class="full">메모<input id="tx-note" placeholder="메모(선택)" /></label>
          <button class="full" type="submit">저장</button>
        </form>
      </section>

      <section class="card">
        <h2>한눈에 보기 (대시보드)</h2>
        <div class="kpis">
          <div><strong>총 용돈 수입</strong><span id="kpi-allowance">0원</span></div>
          <div><strong>총 저축</strong><span id="kpi-saving">0원</span></div>
          <div><strong>총 투자</strong><span id="kpi-invest">0원</span></div>
          <div><strong>저축 비율</strong><span id="kpi-saving-ratio">0%</span></div>
          <div><strong>투자 비율</strong><span id="kpi-invest-ratio">0%</span></div>
          <div><strong>평균 투자 수익률</strong><span id="kpi-return">0%</span></div>
        </div>
      </section>

      <section class="card">
        <h2>일자별 합계</h2>
        <table>
          <thead>
            <tr><th>일자</th><th>용돈 수입 합계</th></tr>
          </thead>
          <tbody id="daily-table"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>전체 거래 내역</h2>
        <table>
          <thead>
            <tr><th>일자</th><th>멤버</th><th>종류</th><th>금액</th><th>수익률</th><th>메모</th></tr>
          </thead>
          <tbody id="tx-table"></tbody>
        </table>
      </section>
    </main>

    <footer>
      <small>현재 버전은 브라우저 LocalStorage에 저장됩니다. (프로토타입)</small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
